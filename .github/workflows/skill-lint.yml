name: skill-lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  skill-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install skill-validator
        run: |
          mkdir -p tools
          curl -sSL https://github.com/agent-ecosystem/skill-validator/releases/download/v1.5.6/skill-validator_1.5.6_linux_amd64.tar.gz \
            | tar -xz -C tools
          chmod +x tools/skill-validator

      - name: Run skill linter
        id: lint
        run: |
          set +e
          ./tools/skill-validator validate structure -o json skills > skill-lint-results.json
          status=$?
          echo "validator_exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ] && [ "$status" -ne 1 ] && [ "$status" -ne 2 ]; then
            echo "::error::skill-validator failed unexpectedly with exit code $status"
            exit "$status"
          fi

      - name: Convert validator output to SARIF
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          repo_root = Path.cwd()
          source = repo_root / "skill-lint-results.json"
          target = repo_root / "results.sarif"

          data = json.loads(source.read_text())
          reports = data.get("skills") or [data]

          def frontmatter_bounds(lines):
              if lines and lines[0].strip() == "---":
                  for index in range(1, len(lines)):
                      if lines[index].strip() == "---":
                          return (1, index + 1)
              return (1, min(len(lines), 1) or 1)

          def first_line_matching(lines, pattern):
              regex = re.compile(pattern)
              for index, line in enumerate(lines, start=1):
                  if regex.search(line):
                      return index
              return None

          def infer_line(file_path, category, message):
              try:
                  lines = file_path.read_text().splitlines()
              except FileNotFoundError:
                  return 1

              start_line, _ = frontmatter_bounds(lines)
              line_match = re.search(r"line (\d+)", message)
              if line_match:
                  return int(line_match.group(1))

              if category == "Frontmatter":
                  if "name is required" in message:
                      return first_line_matching(lines, r"^name:") or start_line
                  if "description is required" in message:
                      return first_line_matching(lines, r"^description:") or start_line
                  if "must be a non-empty string" in message and "description" in message:
                      return first_line_matching(lines, r"^description:") or start_line
                  return start_line

              link_match = re.search(r"(?:broken|internal) link: ([^ ]+)", message)
              if link_match:
                  return first_line_matching(lines, re.escape(link_match.group(1))) or 1

              return 1

          def slugify(value):
              slug = re.sub(r"[^a-z0-9]+", "-", value.lower()).strip("-")
              return slug or "issue"

          rules = {}
          sarif_results = []

          for report in reports:
              skill_dir = Path(report.get("skill_dir", repo_root))
              for result in report.get("results", []):
                  level = result.get("level")
                  if level not in {"error", "warning", "note", "info"}:
                      continue

                  category = result.get("category", "Validation")
                  message = result.get("message", "Validation result")
                  rule_key = f"{category}:{message}"
                  rule_id = f"{slugify(category)}.{slugify(message)[:48]}"
                  if rule_key not in rules:
                      rules[rule_key] = {
                          "id": rule_id,
                          "name": category,
                          "shortDescription": {"text": category},
                          "fullDescription": {"text": message},
                      }

                  file_name = result.get("file") or "SKILL.md"
                  file_path = (skill_dir / file_name).resolve()
                  artifact_uri = file_path.relative_to(repo_root).as_posix() if file_path.is_relative_to(repo_root) else file_name
                  line = infer_line(file_path, category, message)
                  sarif_level = {"error": "error", "warning": "warning", "note": "note", "info": "note"}[level]

                  print(f"::{sarif_level} file={artifact_uri},line={line},title={category}::{message}")

                  sarif_results.append(
                      {
                          "ruleId": rules[rule_key]["id"],
                          "level": sarif_level,
                          "message": {"text": message},
                          "locations": [
                              {
                                  "physicalLocation": {
                                      "artifactLocation": {"uri": artifact_uri},
                                      "region": {"startLine": line},
                                  }
                              }
                          ],
                      }
                  )

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [
                  {
                      "tool": {
                          "driver": {
                              "name": "skill-validator",
                              "informationUri": "https://github.com/agent-ecosystem/skill-validator",
                              "rules": list(rules.values()),
                          }
                      },
                      "results": sarif_results,
                  }
              ],
          }

          target.write_text(json.dumps(sarif, indent=2) + "\n")

          with target.open() as handle:
              generated = json.load(handle)

          assert generated["$schema"]
          assert generated["version"] == "2.1.0"
          assert generated["runs"][0]["tool"]["driver"]["name"]
          for item in generated["runs"][0].get("results", []):
              assert item["ruleId"]
              assert item["message"]["text"]
              assert item["locations"]
          PY

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: skill-spec

      - name: Fail on lint errors
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import sys

          with open("results.sarif") as handle:
              data = json.load(handle)

          errors = sum(
              1
              for run in data.get("runs", [])
              for result in run.get("results", [])
              if result.get("level") == "error"
          )

          if errors > 0:
              print(f"::error::skill-lint: {errors} violation(s) found")
              sys.exit(1)
          PY
